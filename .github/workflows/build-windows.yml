name: Build Windows installer

# Trigger:
#   - Every push to main
#   - Every tag like v1.7.0  (creates a GitHub Release with the .exe attached)
#   - Manually from the Actions tab
on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build .exe on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Refresh logo.ico from logo.png
        run: |
          python -c "from PIL import Image; im=Image.open('assets/img/logo.png').convert('RGBA'); im.save('assets/img/logo.ico', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Download FFmpeg static build
        run: |
          New-Item -ItemType Directory -Force -Path installer\windows\ffmpeg | Out-Null
          Invoke-WebRequest 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile installer\windows\ffmpeg.zip
          Expand-Archive installer\windows\ffmpeg.zip -DestinationPath installer\windows\ffmpeg_tmp -Force
          $ff = Get-ChildItem installer\windows\ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem installer\windows\ffmpeg_tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName installer\windows\ffmpeg\ffmpeg.exe
          Copy-Item $fp.FullName installer\windows\ffmpeg\ffprobe.exe
          Remove-Item installer\windows\ffmpeg.zip
          Remove-Item installer\windows\ffmpeg_tmp -Recurse -Force

      - name: Download VC++ 2015-2022 Redistributable
        run: |
          Invoke-WebRequest 'https://aka.ms/vs/17/release/vc_redist.x64.exe' -OutFile installer\windows\vc_redist.x64.exe

      - name: Run PyInstaller
        env:
          VISIO_EYE_PROJECT_DIR: ${{ github.workspace }}
        run: |
          python -m PyInstaller installer\windows\visio-eye.spec --noconfirm

      - name: Compile installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\visio-eye.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisioEye-Windows-Installer
          path: dist/VisioEye-*-setup.exe
          retention-days: 30

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisioEye-Windows-Portable
          path: dist/visio-eye/
          retention-days: 14

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VisioEye-*-setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
