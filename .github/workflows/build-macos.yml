name: Build macOS .dmg

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build .dmg on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Homebrew tools
        run: |
          brew update
          brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg static builds
        run: |
          mkdir -p installer/macos/ffmpeg
          curl -fsSL -o /tmp/ffmpeg.zip  https://evermeet.cx/ffmpeg/getrelease/zip
          curl -fsSL -o /tmp/ffprobe.zip https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip
          unzip -o /tmp/ffmpeg.zip  -d installer/macos/ffmpeg/
          unzip -o /tmp/ffprobe.zip -d installer/macos/ffmpeg/
          chmod +x installer/macos/ffmpeg/ffmpeg installer/macos/ffmpeg/ffprobe

      - name: Run PyInstaller
        env:
          VISIO_EYE_PROJECT_DIR: ${{ github.workspace }}
        run: |
          python -m PyInstaller installer/macos/visio-eye.spec --noconfirm

      - name: Build .dmg with create-dmg
        run: |
          create-dmg \
            --volname "Visio Eye 1.7.0" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 96 \
            --icon "Visio Eye.app" 150 180 \
            --hide-extension "Visio Eye.app" \
            --app-drop-link 450 180 \
            "dist/VisioEye-1.7.0.dmg" \
            "dist/Visio Eye.app" \
            || hdiutil create -volname "Visio Eye 1.7.0" \
                              -srcfolder "dist/Visio Eye.app" \
                              -ov -format UDZO \
                              "dist/VisioEye-1.7.0.dmg"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisioEye-macOS-DMG
          path: dist/VisioEye-*.dmg
          retention-days: 30

      - name: Upload .app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisioEye-macOS-App
          path: dist/Visio Eye.app/
          retention-days: 14

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VisioEye-*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
